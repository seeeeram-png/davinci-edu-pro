<!DOCTYPE html>
<html lang="ko"> <!-- [선생님 설명] 한국어로 된 홈페이지라는 뜻이야! -->
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>다빈치 에듀 - 과학/사회 탐구</title> <!-- [선생님 설명] 탭에 나올 이름이야! -->
    
    <!-- [선생님 설명] 예쁜 Pretendard 글씨체를 인터넷에서 빌려오는 코드야! -->
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;700;800&display=swap" rel="stylesheet">
    
    <!-- [선생님 설명] 색깔과 배치를 예쁘게 해주는 'Tailwind CSS'라는 도구를 가져온단다! -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        /* [선생님 설명] 위에서 빌려온 예쁜 글씨체를 홈페이지 전체에 적용해줘! */
        body { font-family: 'Pretendard', sans-serif; }
    </style>
</head>
<body class="bg-[#f8fafc]">
    <!-- [선생님 설명] 여기가 네가 만든 멋진 내용물들이 들어갈 자리야! -->
    <div id="root"></div>

    <!-- [선생님 설명] ★가장 중요한 부분! 앞에 점(.)을 하나 찍어서 
         깃허브 관장님에게 "옆에 있는 src 폴더 안의 main 파일을 읽어줘!"라고 알려주는 거야. -->
    <script type="module" src="./src/main.tsx"></script>
</body>
</html>
